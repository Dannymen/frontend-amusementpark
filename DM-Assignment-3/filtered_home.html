<style>
    /* 2x2 GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
    max-width: 1000px;
    margin: auto;
}

/* CARD STYLE */
.card {
    background: #7edc9b;
    border: 3px solid red;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
}

.card img {
    width: 100%;
    height: auto;
    border-radius: 5px;
    margin-bottom: 15px;
}
</style>
